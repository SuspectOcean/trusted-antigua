<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#12808A">
<title>Trusted Antigua — Find trusted tradespeople</title>
<meta name="description" content="Find honest, reliable tradespeople and home-service providers in Antigua & Barbuda — recommended by real residents.">
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: { extend: { colors: {
      navy: "#1B3A5B", teal: "#12808A", gold: "#C8922A",
      sand: "#F6F3EC", ink: "#20303c"
    }}}
  };
</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  html,body{-webkit-tap-highlight-color:transparent;}
  body{background:#F6F3EC;color:#20303c;}
  .safe-bottom{padding-bottom:calc(4.5rem + env(safe-area-inset-bottom));}
  .tabbar{padding-bottom:env(safe-area-inset-bottom);}
  .card-shadow{box-shadow:0 1px 3px rgba(27,58,91,.08),0 1px 2px rgba(27,58,91,.06);}
  [x-cloak]{display:none;}
  .spin{animation:spin 1s linear infinite;}@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body class="min-h-screen">
  <!-- Top bar -->
  <header class="sticky top-0 z-30 bg-navy text-white">
    <div class="max-w-xl mx-auto px-4 h-14 flex items-center justify-between">
      <a href="#/" class="flex items-center gap-2 font-bold tracking-wide">
        <span class="inline-flex items-center justify-center w-7 h-7 rounded-lg bg-teal text-white text-sm">TA</span>
        <span>Trusted Antigua</span>
      </a>
      <a href="#/recommend" class="text-xs bg-gold/90 hover:bg-gold text-white font-semibold px-3 py-1.5 rounded-full">+ Recommend</a>
    </div>
  </header>

  <!-- Demo banner (shown only in demo mode) -->
  <div id="demoBanner" class="hidden bg-gold/15 text-gold-700 text-[12px] text-center px-4 py-1.5 border-b border-gold/30" style="color:#8a6516;">
    Preview mode — showing sample data. Live data activates once the database is connected.
  </div>

  <!-- App content -->
  <main id="app" class="max-w-xl mx-auto px-4 pt-4 safe-bottom"></main>

  <!-- Bottom tab bar (mobile-first) -->
  <nav class="tabbar fixed bottom-0 inset-x-0 z-30 bg-white border-t border-black/10">
    <div class="max-w-xl mx-auto grid grid-cols-3 text-center text-[11px]">
      <a href="#/" data-tab="home" class="tab py-2.5 flex flex-col items-center gap-0.5 text-navy/60">
        <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.7" viewBox="0 0 24 24"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>
        Home
      </a>
      <a href="#/directory" data-tab="directory" class="tab py-2.5 flex flex-col items-center gap-0.5 text-navy/60">
        <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.7" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
        Find
      </a>
      <a href="#/recommend" data-tab="recommend" class="tab py-2.5 flex flex-col items-center gap-0.5 text-navy/60">
        <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.7" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
        Recommend
      </a>
    </div>
  </nav>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
